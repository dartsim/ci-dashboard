name: Update dashboard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    name: Collect and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collect dashboard data
        env:
          DASHBOARD_GITHUB_TOKEN: ${{ secrets.DASHBOARD_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          REQUIRE_RUNNER_STATUS: "true"
          TARGET_REPO: dartsim/dart
          SITE_BASE_URL: https://dartsim.github.io/ci-dashboard/
        run: python scripts/collect.py

      - name: Publish generated site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd public
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update dashboard"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
